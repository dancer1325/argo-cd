apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello
  namespace: test-cronjob
spec:
  schedule: '* * * * *'
  # Job   untracked resource
  #         Reason: NOT defined explicitly | Git -> NOT possible to reconcile
  jobTemplate:
    metadata:
      annotations:
        # ignore update of untracked resources
        argocd.argoproj.io/ignore-resource-updates: 'true'
    spec:
      # Pod untracked resource
      #         Reason: NOT defined explicitly | Git -> NOT possible to reconcile
      template:
        metadata:
          annotations:
            # ignore update of untracked resources
            argocd.argoproj.io/ignore-resource-updates: 'true'
        spec:
          containers:
            - name: hello
              image: busybox:1.28
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - date; echo Hello from the Kubernetes cluster
          restartPolicy: OnFailure