apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    # choose the place / store the Argo CD / INITIALLY bootstrap
    repoURL: https://github.com/dancer1325/argo-cd
    path: manifests/cluster-install
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # MANDATORY
      - ServerSideApply=true