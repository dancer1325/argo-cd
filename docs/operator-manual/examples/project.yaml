apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: my-project
  namespace: argocd
  # Finalizer
  #   allow
  #     TILL project is NOT reference by any application, project is NOT deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project description
  description: Example Project

  # ALLOWED source repos / AppProject's ArgoCD Applications source of truth could come from
  sourceRepos:
  # ALL are ALLOWED
  - '*'

  # Kubernetes cluster & namespace | Applications can be deployed
  # ways to identify the destination clusters
  #   1. -- by -- 'server'
  #   2. -- by -- 'name'
  #   3. -- by -- 'name' + 'server'
  destinations:
  - namespace: guestbook
    server: https://kubernetes.default.svc
    name: in-cluster
  # Destinations also allow wildcard globbing
  - namespace: guestbook-*
    server: https://kubernetes.default.svc
    name: in-cluster

  # cluster-scoped resources / ALLOWED from being created
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
    # Name
    #   OPTIONAL
    #     if it's specified -> ONLY resources / matching name are ALLOWED
    # Globs in Go's filepath.Match syntax are supported. Example: "team1-*".
    name: ''

  # cluster-scoped resources / DENIED from being created
  clusterResourceBlacklist:
    - group: ''
      kind: Namespace
      # Name
      #   OPTIONAL
      #     if it's specified -> ONLY resources / matching name are DENIED
      name: 'kube-*'

  # cluster-scoped resources / DENIED from being created
  #   == REST can be created
  namespaceResourceBlacklist:
  - group: ''
    kind: ResourceQuota
  - group: ''
    kind: LimitRange
  - group: ''
    kind: NetworkPolicy

  # cluster-scoped resources / ALLOWED from being created
  #   == REST can NOT be created
  namespaceResourceWhitelist:
  - group: 'apps'
    kind: Deployment
  - group: 'apps'
    kind: StatefulSet

  # Enables namespace orphaned resource monitoring.
  orphanedResources:
    warn: false

  #
  roles:
  # A role which provides read-only access to all applications in the project
  - name: read-only
    description: Read-only privileges to my-project
    policies:
    - p, proj:my-project:read-only, applications, get, my-project/*, allow
    groups:
    - my-oidc-group

  # A role which provides sync privileges to only the guestbook-dev application, e.g. to provide
  # sync privileges to a CI system
  - name: ci-role
    description: Sync privileges for guestbook-dev
    policies:
    - p, proj:my-project:ci-role, applications, sync, my-project/guestbook-dev, allow

    # NOTE: JWT tokens can only be generated by the API server and the token is not persisted
    # anywhere by Argo CD. It can be prematurely revoked by removing the entry from this list.
    jwtTokens:
    - iat: 1535390316

  # Sync windows restrict when Applications may be synced. https://argo-cd.readthedocs.io/en/stable/user-guide/sync_windows/
  syncWindows:
  - kind: allow
    schedule: '10 1 * * *'
    duration: 1h
    applications:
      - '*-prod'
    manualSync: true
  - kind: deny
    schedule: '0 22 * * *'
    duration: 1h
    namespaces:
      - default
  - kind: allow
    schedule: '0 23 * * *'
    duration: 1h
    clusters:
      - in-cluster
      - cluster1

  # By default, apps may sync to any cluster specified under the `destinations` field, even if they are not
  # scoped to this project. Set the following field to `true` to restrict apps in this cluster to only clusters
  # scoped to this project.
  permitOnlyProjectScopedClusters: false

  # When using Applications-in-any-namespace, this field determines which namespaces this AppProject permits
  # Applications to reside in. Details: https://argo-cd.readthedocs.io/en/stable/operator-manual/app-any-namespace/
  sourceNamespaces:
  - "argocd-apps-*"
