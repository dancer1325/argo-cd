# argocd-application-controller deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-application-controller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  template:
    spec:
      containers:
        - name: argocd-application-controller
          # add `--metrics-cluster-labels` / EACH label
          command:
            - argocd-application-controller
            - --metrics-cluster-labels
            - team-name
            - --metrics-cluster-labels
            - environment