apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons-general
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/dancer1325/argo-cd.git
        revision: HEAD
        directories:
          - path: applicationset/examples/git-generator-directory/cluster-addons/*
        # ADDITIONAL parameters
        values:
          cluster: '{{.path.basename}}'
  template:
    metadata:
      name: 'cluster-addons-general-{{.path.basename}}'
      labels:
        values.cluster: '{{.values.cluster}}'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/dancer1325/argo-cd.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        # use values -- by -- `.values.` prefix
        namespace: '{{.values.cluster}}'