apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: generator-git-directory-rootrepo
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/dancer1325/argocd-example-apps.git
        revision: HEAD
        directories:
          - path: '*'
  template:
    metadata:
      name: 'generator-git-directory-rootrepo-{{.path.basename}}'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/dancer1325/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'