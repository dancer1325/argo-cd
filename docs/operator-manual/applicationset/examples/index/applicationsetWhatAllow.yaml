# allows: | 1! Kubernetes manifest,
## target MULTIPLE Kubernetes clusters
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-multi-cluster
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: '{{.name}}-guestbook'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        # server -- depends on -- generator's parameter
        server: '{{.server}}'
        namespace: default
---
## 💡manage MULTIPLE Argo CD Applications 💡-- as a -- 1! unit
