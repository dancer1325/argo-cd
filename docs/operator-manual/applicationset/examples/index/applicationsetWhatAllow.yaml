---
## deploy MULTIPLE applications -- from -- >=1 Git repositories
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multi-app-multi-repo
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - appName: frontend
            repoURL: https://github.com/dancer1325/argocd-example-apps.git
            path: guestbook
          - appName: backend
            repoURL: https://github.com/dancer1325/argocd-example-apps.git
            path: helm-guestbook
  template:
    metadata:
      name: '{{.appName}}'
    spec:
      project: default
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: HEAD
        path: '{{.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: default
