---
# .flatList
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-flatlist
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      flatList: true
  template:
    metadata:
      name: 'all-clusters-guestbook'
    spec:
      project: default
      source:
        repoURL: https://github.com/dancer1325/argocd-example-apps.git
        targetRevision: HEAD
        path: helm-guestbook
        # .clusters
        #
        helm:
          values: |
            clusters:
            {{- range .clusters }}
              - name: {{ .name }}
                server: {{ .server }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: default
---
# .selector
##   .matchLabels
##      filters which clusters to target based on labels
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-selector-label
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchLabels:
          env: staging
  template:
    metadata:
      name: '{{.name}}-guestbook-selector-label'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: default
# Only generates Applications for clusters with label env=staging
---
# .selector
##   .matchExpressions
##      filters which clusters to target based -- on -- expressions
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-selector-expression
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
           matchExpressions:
           - key: env
             operator: In
             values:
             - staging
  template:
    metadata:
      name: '{{.name}}-guestbook-selector-expression'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: default
# Only generates Applications for clusters with label env=staging
---
# .template: overrides the spec.template for this generator
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-template-override
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchLabels:
          env: production
      # generator's template takes precedence over spec.template
      template:
        metadata:
          name: 'prod-{{.name}}-guestbook-template-override'
        spec:
          project: default
          source:
            repoURL: https://github.com/argoproj/argocd-example-apps.git
            targetRevision: v1.0.0
            path: guestbook
          destination:
            server: '{{.server}}'
            namespace: production
  template:
    metadata:
      name: '{{.name}}-guestbook'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: default
# Production clusters use v1.0.0 and deploy to "production" namespace
# Other clusters would use HEAD and "default" namespace
---
# .values
#   adds custom key/value pairs to the generated parameters
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-values
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      values:
        revision: HEAD
        targetNamespace: guestbook
        # use built-in parameter -- as -- value
        clusterName: '{{.name}}'
  template:
    metadata:
      name: '{{.name}}-guestbook-values'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        # access to values parameters
        targetRevision: '{{.values.revision}}'
        path: guestbook
      destination:
        server: '{{.values.clusterName}}'
        namespace: '{{.values.targetNamespace}}'
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-clustergenerator-template-override
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        # list generator's template
        #   overrides spec.template
        template:
          metadata:
            name: 'clustergenerator-templateoverride-{{.name}}'
          spec:
            project: default
            source:
              repoURL: https://github.com/dancer1325/argocd-example-apps.git
              targetRevision: HEAD
              path: guestbook
            destination:
              server: https://kubernetes.default.svc
              namespace: '{{.name}}'
  # spec.template
  # uses
  #   fallback | generators WITHOUT their OWN template
  template:
    metadata:
      name: 'default-{{.env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.env}}'
---
# built-in parameters
#   name, server, project
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-builtin-parameters-name-server-project
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            env: staging
  template:
    metadata:
      name: '{{.name}}-guestbook-builtin-parameters-name-server-project'
    spec:
      project: '{{.project}}'
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps/
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: guestbook

---
# built-in parameters
#   nameNormalized
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-builtin-parameters-namenormalized
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            env: staging
  template:
    metadata:
      name: '{{.nameNormalized}}-guestbook-builtin-parameters-namenormalized'
    spec:
      project: '{{.project}}'
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps/
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: guestbook

---
# built-in parameters
#   metadata
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-builtin-parameters-metadata
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - clusters:
        # exclude the clusters
        #   Reason: OTHERWISE, template fails looking for the labels OR annotations
        selector:
          matchExpressions:
          - key: env
            operator: Exists
  template:
    metadata:
      name: 'clustergenerator-guestbook-builtin-metadata-{{.name}}'
      annotations:
        # built-in metadata parameters from cluster Secret's labels and annotations
        #   .metadata.
        #     Reason:🧠goTemplate:true🧠
        cluster-env: '{{.metadata.labels.env}}'
        cluster-team: '{{.metadata.annotations.team}}'
        cluster-region: '{{.metadata.annotations.region}}'
    spec:
      project: '{{.project}}'
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps/
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: guestbook

---
# filter clusters -- based on -- their K8s version
#   exist PREVIOUS Application | that cluster
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-previous-filtered-byk8sversion
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: '{{.name}}-guestbook-previous-filtered-byk8sversion'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: default
# Only generates Applications for clusters with label env=staging
---
# filter clusters -- based on -- their K8s version
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-filtered-byk8sversion
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/kubernetes-version: v1.34.3
  template:
    metadata:
      name: '{{.name}}-guestbook-filtered-byk8sversion'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: guestbook
      destination:
        server: '{{.server}}'
        namespace: default
# Only generates Applications for clusters with label env=staging
