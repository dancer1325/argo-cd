apiVersion: v1
kind: Secret
metadata:
  name: mycluster-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    env: staging
type: Opaque
stringData:
  name: "kind2"
  server: "https://172.18.0.3:6443"
  #server: "https://<docker inspect kind2-control-plane --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')>:6443"

  # config
  #   "caData": "<kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="kind-kind2")].cluster.certificate-authority-data}'>",
  #   "certData": "<kubectl config view --raw -o jsonpath='{.users[?(@.name=="kind-kind2")].user.client-certificate-data}'>",
  #   "keyData": "<kubectl config view --raw -o jsonpath='{.users[?(@.name=="kind-kind2")].user.client-key-data }'>"
  config: |
    {
      "tlsClientConfig": {
        "insecure": false,
        "caData": "",
        "certData": "",
        "keyData": ""
      }
    }
---
