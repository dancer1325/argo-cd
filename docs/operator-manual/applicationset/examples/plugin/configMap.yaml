apiVersion: v1
kind: ConfigMap
metadata:
  name: my-plugin
  namespace: argocd
data:
  # Pre-shared token
  #   == key / created | "argocd-secret" Secret
  #   == $<SOME_K8S_SECRET>:plugin.myplugin.token
  #   uses
  #     authenticate HTTP request
  # 1. sensitive data / stored | "argocd-secret"
  token: "$plugin.myplugin.token"
  # 2. sensitive data / stored | "another-secret"
  #token: "$another-secret:plugin.myplugin.token"

  # == k8s service's BaseUrl /
  #   expose your plugin | cluster
  baseUrl: "http://myplugin.plugin-ns.svc.cluster.local."

  # == timeout of the request -- to the -- plugin
  # by default, 30"
  requestTimeout: "60"