apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - cluster: engineering-dev
            url: https://kubernetes.default.svc
            env: staging
          - cluster: engineering-prod
            url: https://kubernetes.default.svc
            env: prod
      # PREVIOUS list -> generate 2 Applications

      # filter Application -- based on --
      selector:
        # 1. labels, OR
        matchLabels:
          env: staging
        # 2. expressions
#        matchExpressions:
#          - key: env
#            operator: In
#            values:
#              - staging
  template:
    metadata:
      name: '{{.cluster}}-guestbook'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj-labs/applicationset.git
        targetRevision: HEAD
        path: examples/list-generator/guestbook/{{.cluster}}
      destination:
        server: '{{.url}}'
        namespace: guestbook