apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dancer1325/argo-cd-hello-world-config
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
      - values.prod.yaml
  destination:
    # TODO: adjust it
    server: https://k8s-prod.example.com
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
