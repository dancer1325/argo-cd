metadata:
  name: guestbook-projectrole-jwttoken
  namespace: argocd
spec:
  project: sample-test-project
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: default
