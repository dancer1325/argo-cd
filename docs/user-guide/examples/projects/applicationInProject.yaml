apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-in-project
  namespace: argocd
spec:
  project: example-project
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: default

---
# feature: restrict what may be deployed
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-notallowed-to-deploy-project-dueto-sourcerepo
  namespace: argocd
spec:
  project: example-project
  source:
    # repoURL   !=  "example-project" AppProject's .sourceRepos
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: default

---
# feature: restrict destination clusters & namespaces | apps -- may be -- deployed
#   -- via -- `spec.destinations`
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-notallowed-to-deploy-project-dueto-destination
  namespace: argocd
spec:
  project: example-project
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  # destination !=  "example-project" AppProject's .destinations
  destination:
    server: https://kubernetes.default.svc
    namespace: notcontainedinproject
---
# feature: restrict the kinds of objects may be deployed
#   -- via -- `*ResourceWhitelist/Blacklist`
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-restrictions-dueto--namespaceblackorwhitelist
  namespace: argocd
spec:
  project: example-namespaceresourcewhiteandblacklist-project
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: default