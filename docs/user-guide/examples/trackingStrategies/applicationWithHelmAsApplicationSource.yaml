apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-helm-prod
spec:
  source:
    chart: myapp
    repoURL: https://charts.example.com
    # 1. Pin -- to a -- version
    targetRevision: 1.2.0
    # 2. Track patches
    # 2.1 -- via -- *
    # targetRevision: 1.2.*
    # 2.2 -- by -- specifying a range
    # targetRevision: ">=1.2.0 <1.3.0"
    # 3. Track minor releases
    # 3.1 -- via -- *
    # targetRevision: 1.*     # Tracks 1.0.0, 1.1.0, 1.2.0, etc.
    # 3.2 -- by -- specifying a range
    # targetRevision: ">=1.0.0 <2.0.0"
    # 4. Use the latest
    # 4.1 -- via -- *
    # targetRevision: "*"     # Latest stable version
    # 4.2 -- by -- range
    # targetRevision: ">=0.0.0"
    # 5. Use the latest including pre-releases
    # 5.1 -- via -- *
    # targetRevision: "*-0"
    # 5.2 -- by -- range
    # targetRevision: ">=0.0.0-0"
