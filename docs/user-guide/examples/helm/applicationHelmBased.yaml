---
# valueFiles
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook-valuesfiles-ignoremissing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      # valueFiles
      #   relative path -- to -- spec.source.repoURL
      #     this case: https://github.com/dancer1325/argocd-example-apps/helm-guestbook/values-random.yaml
      valueFiles:
        - values-production.yaml
        - values-random.yaml
      ignoreMissingValueFiles: true
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-guestbook-valuesfiles-ignoremissing
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
