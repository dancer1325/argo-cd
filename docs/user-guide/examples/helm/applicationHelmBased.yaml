# values
## valuesObject' priority vs values' priority
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook-valuesobject-priority
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      valuesObject:
        service:
          type: ClusterIP
      values: |
        service:
          type: Ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-guestbook-valuesobject-priority
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
