apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    chart: sealed-secrets
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    targetRevision: 1.16.1
    helm:
      releaseName: sealed-secrets
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubeseal

---
# public OCI helm chart
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
spec:
  project: default
  source:
    chart: nginx
    repoURL: registry-1.docker.io/bitnamicharts  # note: the oci:// syntax is not included.
    targetRevision: 15.9.0
  destination:
    name: "in-cluster"
    namespace: nginx
---
# valueFiles
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook-valuesfiles
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      # valueFiles
      #   relative path -- to -- spec.source.repoURL
      #     this case: https://github.com/dancer1325/argocd-example-apps/helm-guestbook/values-production.yaml
      valueFiles:
      - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-guestbook-valuesfiles
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
---
