# Helm parameters
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook-parameters
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dancer1325/argocd-example-apps
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      parameters:
      - name: "service.type"
        value: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-guestbook-parameters
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
