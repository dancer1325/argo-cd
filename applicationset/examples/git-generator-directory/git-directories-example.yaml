apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/dancer1325/argo-cd.git
      revision: HEAD
      directories:
      - path: applicationset/examples/git-generator-directory/cluster-addons/*
  template:
    metadata:
      name: '{{.path.basename}}'
      labels:
        # ERROR: 's size > 63   == k8s' labels restriction
        #pathpath: '{{.path.path}}'
        pathbasename: '{{.path.basename}}'
        pathbasenamenormalized: '{{.path.basenameNormalized}}'
      annotations:
        # path: applicationset/examples/git-generator-directory/cluster-addons/<name>
        path-segment-0: '{{index .path.segments 0}}'
        path-segment-1: '{{index .path.segments 1}}'
        path-segment-2: '{{index .path.segments 2}}'
        path-segment-3: '{{index .path.segments 3}}'
        path-segment-4: '{{index .path.segments 4}}'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/dancer1325/argo-cd.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
