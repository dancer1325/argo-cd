apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-auto-sync
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  # DECLARATIVE sync policy: Define desired behavior
  syncPolicy:
    # Automated synchronization
    automated:
      prune: true      # Remove resources not in Git
      selfHeal: true   # Revert manual changes to cluster
      allowEmpty: false

    # Sync options
    syncOptions:
      - CreateNamespace=true    # Auto-create namespace if missing
      - PruneLast=true          # Delete resources last
      - ApplyOutOfSyncOnly=true # Only sync changed resources

    # Retry strategy
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # You don't define HOW to:
  # - Detect drift
  # - Retry on failure
  # - Revert manual changes
  #
  # You only DECLARE that you want these behaviors
  # ArgoCD implements the logic
