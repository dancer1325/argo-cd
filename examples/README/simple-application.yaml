apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: argocd
spec:
  # project / application belongs to
  project: default

  # application / deploy
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook   # == path | repoURL

  # destination cluster & namespace | deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: default
